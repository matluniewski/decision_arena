services:
  - type: web
    name: decision-arena-api
    runtime: docker
    plan: free
    rootDir: backend
    healthCheckPath: /actuator/health
    envVars:
      - key: APP_AI_MODE
        value: mock
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_BASE_URL
        value: https://api.openai.com
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
