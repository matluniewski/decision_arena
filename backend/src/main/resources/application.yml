spring:
  application:
    name: decision-arena
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/decision_arena}
    username: ${DATABASE_USERNAME:decision_arena}
    password: ${DATABASE_PASSWORD:decision_arena}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${PORT:8080}
  error:
    include-message: never

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  ai:
    mode: ${APP_AI_MODE:mock}
    model: ${APP_AI_MODEL:${OPENAI_MODEL:${GEMINI_MODEL:}}}
    api-key: ${APP_AI_API_KEY:${OPENAI_API_KEY:${GEMINI_API_KEY:}}}
    base-url: ${APP_AI_BASE_URL:${OPENAI_BASE_URL:${GEMINI_BASE_URL:}}}
  decision:
    max-question-length: 280
    min-options: 2
    max-options: 4
    min-criteria: 4
    max-criteria: 6
    min-weight: 1
    max-weight: 5
  rate-limit:
    enabled: ${APP_RATE_LIMIT_ENABLED:true}
    window-seconds: ${APP_RATE_LIMIT_WINDOW_SECONDS:600}
    max-requests: ${APP_RATE_LIMIT_MAX_REQUESTS:60}

logging:
  level:
    com.decisionarena: INFO
