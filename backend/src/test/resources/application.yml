spring:
  datasource:
    url: jdbc:h2:mem:decisionarena;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

app:
  cors:
    allowed-origins:
      - http://localhost:5173
  ai:
    mode: mock
  rate-limit:
    window-seconds: 3600
    max-requests: 50
